<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>伺服器知識庫 - Wistron v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f3; color: #1a1a1a; min-height: 100vh;
  }
  
  /* 導覽列 */
  .page-header { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 18px 36px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .page-header h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  
  .nav-tabs { display: flex; gap: 24px; margin-top: 8px; }
  .nav-tab { padding: 8px 4px 12px; font-size: 14px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .nav-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

  .header-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 12px; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; font-size: 12px; font-weight: 500;
    border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); cursor: pointer; background: #fff; transition: all 0.15s;
  }
  .action-btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  #file-input, #level-img-input { display: none; }

  .main { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .content-view { display: none; }
  .content-view.active { display: block; }

  /* 組階頁面 L1-L12 */
  .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .level-card { background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); overflow: hidden; position: relative; }
  
  .level-img-container {
    width: 100%; height: 200px; background: #eee; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; border-bottom: 1px solid #f0f0f0;
  }
  .level-img-container img { width: 100%; height: 100%; object-fit: contain; }
  .level-placeholder { font-size: 48px; font-weight: 800; color: #ccc; }
  
  /* 圖片上傳按鈕 */
  .upload-img-btn {
    position: absolute; bottom: 10px; right: 10px; width: 36px; height: 36px;
    background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; z-index: 10; transition: transform 0.2s;
  }
  .upload-img-btn:hover { transform: scale(1.1); background: #fff; }
  .upload-img-btn svg { width: 18px; height: 18px; stroke: #555; }

  .level-info { padding: 16px; }
  .level-badge { background: #1a1a1a; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-bottom: 8px; display: inline-block; }
  .level-title-en { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #333; }
  .level-desc-zh { font-size: 13px; color: #666; line-height: 1.5; padding-top: 10px; border-top: 1px solid #f0f0f0; }

  /* 縮寫查詢相關 */
  .search-bar { width: 100%; max-width: 860px; margin: 0 auto 16px; position: relative; }
  .search-bar input { width: 100%; padding: 10px 40px; font-size: 15px; border: 1px solid rgba(0,0,0,0.15); border-radius: 10px; outline: none; }
  .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .cat-btn { padding: 10px; border: 1px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; text-align: center; }
  .cat-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .entry { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 6px; }
  .entry-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; font-size: 14px; }
  .abbr-tag { font-weight: 700; min-width: 80px; }
  .entry-detail { display: none; padding: 16px; background: #fafafa; border-top: 0.5px solid #eee; }
  .entry.open .entry-detail { display: block; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; transition: all 0.3s; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-top">
    <h1>Wistron Server Knowledge</h1>
    <div class="header-actions" id="abbr-actions">
      <button class="action-btn" onclick="openAddModal()">新增縮寫</button>
      <label class="action-btn primary" for="file-input">上傳 Excel</label>
      <input type="file" id="file-input" accept=".xlsx,.xls" />
    </div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchView('abbr-view', this)">縮寫查詢</div>
    <div class="nav-tab" onclick="switchView('level-view', this)">組階說明 (L1-L12)</div>
  </div>
</div>

<div class="main">
  <div id="abbr-view" class="content-view active">
    <div class="search-bar">
      <input type="text" id="search" placeholder="搜尋關鍵字..." autocomplete="off" />
    </div>
    <div class="category-grid" id="cat-grid"></div>
    <div id="results"></div>
  </div>

  <div id="level-view" class="content-view">
    <div class="level-grid" id="level-list"></div>
  </div>
</div>

<input type="file" id="level-img-input" accept="image/*" />

<div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:300; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:24px; border-radius:14px; width:90%; max-width:400px;">
      <h2 style="font-size:16px; margin-bottom:16px;">新增縮寫</h2>
      <div style="margin-bottom:12px;"><label style="font-size:11px; color:#888;">分類</label><select id="add-cat" style="width:100%; padding:8px;"></select></div>
      <div style="margin-bottom:12px;"><label style="font-size:11px; color:#888;">縮寫 *</label><input type="text" id="add-abbr" style="width:100%; padding:8px;"></div>
      <div style="margin-bottom:12px;"><label style="font-size:11px; color:#888;">全稱 *</label><input type="text" id="add-full" style="width:100%; padding:8px;"></div>
      <div style="margin-bottom:20px;"><label style="font-size:11px; color:#888;">中文</label><textarea id="add-zh" style="width:100%; padding:8px;"></textarea></div>
      <div style="display:flex; justify-content:flex-end; gap:8px;">
        <button onclick="document.getElementById('add-modal').style.display='none'" style="padding:8px 16px; border:1px solid #ddd; background:none; border-radius:8px;">取消</button>
        <button onclick="submitAdd()" style="padding:8px 16px; background:#1a1a1a; color:#fff; border:none; border-radius:8px;">新增</button>
      </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 組階資料與圖片持久化 ──────────────────────────────
const LEVEL_BASE = [
  { lv: "Level 1", title: "Parts manufacturing", zh: "零件製造：包含未上漆零件、組件級別的模具零件。" },
  { lv: "Level 2", title: "Piece Parts Sub Assembly", zh: "零件預組：零件的初步組裝階段。" },
  { lv: "Level 3", title: "Chassis Assembly", zh: "機殼組裝：金屬與塑料件整合並作為機殼出貨。" },
  { lv: "Level 4", title: "Chassis + PSU/Backplane", zh: "機殼基礎套件：機殼加裝電源供應器 (PSU) 或背板。" },
  { lv: "Level 5", title: "Enclosure with Cables", zh: "完整外殼：包含 L4 所有組件、線纜整合及 I/O 測試。" },
  { lv: "Level 6", title: "Motherboard Integration", zh: "主機板整合：將主機板組裝至機殼內並進行開機測試。" },
  { lv: "Level 7", title: "Add-on Card Integration", zh: "擴充卡整合：整合各式 Add-on Card 並進行測試。" },
  { lv: "Level 8", title: "Hard Drive Integration", zh: "硬碟整合：在伺服器準系統中整合硬碟並進行測試。" },
  { lv: "Level 9", title: "CPU & Memory Integration", zh: "核心組件整合：整合 CPU 與記憶體並進行功能測試。" },
  { lv: "Level 10", title: "Full System Assembly", zh: "全系統組裝：完整伺服器解決方案，含軟體整合與測試。" },
  { lv: "Level 11", title: "Rack Integration & Testing", zh: "機櫃整合：節點組裝至機櫃，完成全機櫃佈線與測試。" },
  { lv: "Level 12", title: "Multi-rack / Solution", zh: "多機櫃解決方案：多機櫃製造與叢集管理解決方案。" }
];

// 讀取圖片存儲
let levelImages = JSON.parse(localStorage.getItem('WISTRON_LEVEL_IMGS')) || {};
let currentUploadIndex = null;

function saveImages() { localStorage.setItem('WISTRON_LEVEL_IMGS', JSON.stringify(levelImages)); }

function renderLevels() {
  const container = document.getElementById('level-list');
  container.innerHTML = LEVEL_BASE.map((item, index) => {
    const imgData = levelImages[index];
    return `
    <div class="level-card">
      <div class="level-img-container" id="img-ctx-${index}">
        ${imgData ? `<img src="${imgData}" />` : `<div class="level-placeholder">L${index+1}</div>`}
        <div class="upload-img-btn" onclick="triggerImgUpload(${index})" title="上傳小圖">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        </div>
      </div>
      <div class="level-info">
        <span class="level-badge">${item.lv}</span>
        <div class="level-title-en">${item.title}</div>
        <div class="level-desc-zh">${item.zh}</div>
      </div>
    </div>
  `}).join('');
}

function triggerImgUpload(index) {
  currentUploadIndex = index;
  document.getElementById('level-img-input').click();
}

document.getElementById('level-img-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file || currentUploadIndex === null) return;
  
  const reader = new FileReader();
  reader.onload = (event) => {
    levelImages[currentUploadIndex] = event.target.result;
    saveImages();
    renderLevels();
    showToast('圖片上傳成功');
  };
  reader.readAsDataURL(file);
});

// ── 原有縮寫功能 (保持不變) ──────────────────────────────
let DATA = JSON.parse(localStorage.getItem('WISTRON_ABBR_V2')) || { "Schedule": [], "Hardware": [] };
let activecat = null, query = '', openEntries = new Set();

function switchView(viewId, el) {
  document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  el.classList.add('active');
  document.getElementById('abbr-actions').style.visibility = (viewId === 'abbr-view') ? 'visible' : 'hidden';
  if(viewId === 'level-view') renderLevels();
}

function renderAbbr() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = Object.keys(DATA).map(cat => `<button class="cat-btn ${activecat===cat?'active':''}" onclick="filterCat('${cat}')">${cat}</button>`).join('');
  const container = document.getElementById('results');
  const q = query.toLowerCase().trim();
  let html = '';
  Object.keys(DATA).forEach(cat => {
    if(activecat && cat !== activecat) return;
    let entries = DATA[cat].filter(e => !q || e.abbr.toLowerCase().includes(q) || e.full.toLowerCase().includes(q));
    if (entries.length) {
      html += `<div style="margin-bottom:20px;"><div style="font-size:12px;color:#888;margin-bottom:10px;font-weight:700;">${cat}</div>`;
      entries.forEach((e, i) => {
        const id = `${cat}_${i}`;
        html += `<div class="entry ${openEntries.has(id)?'open':''}"><div class="entry-header" onclick="toggle('${id}')"><span class="abbr-tag">${e.abbr}</span><span>${e.full}</span></div><div class="entry-detail">${e.zh||'無中文說明'}</div></div>`;
      });
      html += `</div>`;
    }
  });
  container.innerHTML = html || '無資料';
}

function filterCat(c) { activecat = (activecat===c)?null:c; renderAbbr(); }
function toggle(id) { openEntries.has(id)?openEntries.delete(id):openEntries.add(id); renderAbbr(); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function openAddModal() { 
    const sel = document.getElementById('add-cat');
    sel.innerHTML = Object.keys(DATA).map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('add-modal').style.display='flex'; 
}
function submitAdd() {
    const cat = document.getElementById('add-cat').value;
    DATA[cat].push({abbr: document.getElementById('add-abbr').value, full: document.getElementById('add-full').value, zh: document.getElementById('add-zh').value});
    localStorage.setItem('WISTRON_ABBR_V2', JSON.stringify(DATA));
    document.getElementById('add-modal').style.display='none';
    renderAbbr();
}

document.getElementById('search').addEventListener('input', (e)=>{ query=e.target.value; renderAbbr(); });
renderAbbr();
</script>
</body>
</html>
