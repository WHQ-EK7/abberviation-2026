const CAT_LABELS = {
  "Schedule / Phase": "Schedule / Phase",
  "Modules": "Modules",
  "Board and Component": "Board & Component",
  "NV Relating": "NV Relating",
  "Modules Cooling": "Cooling Modules",
  "Others": "Others",
  "SPEC/DOC": "SPEC / DOC",
  "Material": "Material",
  "Surface Treatment": "Surface Treatment"
};

let activecat = null;
let query = '';
let openEntries = new Set();

function hl(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderCats() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.entries(DATA).forEach(([cat, entries]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activecat === cat ? ' active' : '');
    btn.innerHTML = (CAT_LABELS[cat] || cat) + '<span class="count">' + entries.length + '</span>';
    btn.onclick = () => {
      activecat = activecat === cat ? null : cat;
      query = '';
      document.getElementById('search').value = '';
      document.getElementById('clear-btn').style.display = 'none';
      render();
    };
    grid.appendChild(btn);
  });
}

function render() {
  renderCats();
  const container = document.getElementById('results');
  const q = query.toLowerCase().trim();
  let sections = [];

  const cats = activecat ? [activecat] : Object.keys(DATA);
  cats.forEach(cat => {
    let entries = DATA[cat];
    if (q) {
      entries = entries.filter(e =>
        e.abbr.toLowerCase().includes(q) ||
        e.full.toLowerCase().includes(q) ||
        e.zh.toLowerCase().includes(q)
      );
    }
    if (entries.length > 0) sections.push({cat, entries});
  });

  if (sections.length === 0) {
    container.innerHTML = '<div class="no-results">找不到符合的縮寫</div>';
    return;
  }

  container.innerHTML = sections.map(({cat, entries}) => `
    <div class="section">
      <div class="section-header">${CAT_LABELS[cat] || cat}</div>
      <div class="entry-list">
        ${entries.map((e, i) => {
          const id = cat + '_' + i;
          const isOpen = openEntries.has(id);
          return '<div class="entry' + (isOpen ? ' open' : '') + '" data-id="' + id + '">' +
            '<div class="entry-header" onclick="toggle(\'' + id + '\')">' +
              '<span class="abbr-tag">' + hl(e.abbr, query) + '</span>' +
              '<span class="full-preview">' + hl(e.full, query) + '</span>' +
              '<span class="chevron">▶</span>' +
            '</div>' +
            '<div class="entry-detail">' +
              '<div class="detail-label">英文全稱</div>' +
              '<div class="detail-val">' + hl(e.full, query) + '</div>' +
              (e.zh ? '<div class="detail-label">中文說明</div><div class="detail-val">' + hl(e.zh, query) + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('')}
      </div>
    </div>
  `).join('');
}

function toggle(id) {
  if (openEntries.has(id)) openEntries.delete(id);
  else openEntries.add(id);
  const el = document.querySelector('[data-id="' + id + '"]');
  if (el) el.classList.toggle('open');
}

document.getElementById('search').addEventListener('input', function() {
  query = this.value;
  activecat = null;
  openEntries.clear();
  document.getElementById('clear-btn').style.display = query ? 'flex' : 'none';
  render();
});

document.getElementById('clear-btn').addEventListener('click', function() {
  document.getElementById('search').value = '';
  query = '';
  this.style.display = 'none';
  render();
});

render();
</script>
</body>
</html>
